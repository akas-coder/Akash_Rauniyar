<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Gradients -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glowing space background ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#textGrad)" stroke-width="2" opacity="0.3" />
  
  <!-- Orbit Ring behind the Letter -->
  <ellipse cx="50" cy="53" rx="40" ry="12" fill="none" stroke="url(#orbitGrad)" stroke-width="4" transform="rotate(-15 50 53)" filter="url(#glow)" stroke-dasharray="140" stroke-dashoffset="10" />

  <!-- Monogram Letter "A" -->
  <text x="50" y="68" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="52" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">A</text>

  <!-- Glowing Orbit Planet/Satellite -->
  <circle cx="82" cy="45" r="5.5" fill="#ffffff" filter="url(#glow)" />
</svg>
